  <style>
    .thankyou {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(48px, 8vw, 96px) var(--gutter);
      background:
        radial-gradient(65% 55% at 90% 20%, rgba(212,152,15,.18) 0%, transparent 65%),
        radial-gradient(55% 60% at 5% 85%, rgba(212,152,15,.08) 0%, transparent 65%),
        var(--c-bg);
      text-align: center;
      color: var(--c-text);
    }
    .thankyou__card {
      max-width: 520px;
      width: 100%;
      display: grid;
      gap: 24px;
      justify-items: center;
    }
    .thankyou__icon {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      background: var(--gold-grad);
      display: grid;
      place-items: center;
      box-shadow: 0 12px 40px -10px rgba(212,152,15,.50);
    }
    .thankyou__icon svg { color: #FFFFFF; }
    .thankyou__eyebrow {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--c-primary-light);
    }
    .thankyou__title {
      font-family: var(--ff-serif);
      font-style: italic;
      color: var(--c-heading);
      font-size: clamp(30px, 6vw, 48px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.018em;
      margin: 0;
    }
    .thankyou__title em {
      font-style: italic;
      font-weight: 700;
      background: var(--gold-grad);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .thankyou__sub {
      font-size: clamp(15px, 1.8vw, 17px);
      color: var(--c-muted);
      line-height: 1.65;
      max-width: 42ch;
      margin: 0;
    }
    .thankyou__wa {
      --bg: #25D366;
      --fg: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 32px;
      border-radius: 999px;
      font-family: var(--ff-sans);
      font-weight: 600;
      font-size: 15px;
      background: var(--bg);
      color: var(--fg);
      border: none;
      box-shadow: 0 8px 30px -8px rgba(37,211,102,.50);
      text-decoration: none;
      transition: transform .2s ease, box-shadow .25s ease;
      width: 100%;
      max-width: 360px;
    }
    .thankyou__wa:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 40px -10px rgba(37,211,102,.55);
    }
    .thankyou__wa:active { transform: translateY(0); }
    .thankyou__back {
      font-size: 13.5px;
      color: var(--c-muted);
    }
    .thankyou__back a {
      color: var(--c-primary-light);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
